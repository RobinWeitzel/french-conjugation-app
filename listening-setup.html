<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Practice French listening comprehension offline">
    <meta name="theme-color" content="#4a90e2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="French Verbs">
    <title>Listening Setup - French Verbs</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="196x196" href="./icons/favicon-196.png">
    <link rel="apple-touch-icon" href="./icons/apple-icon-180.png">
    <link rel="stylesheet" href="shared.css">
    <style>
        .setup-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
        }

        .setup-section {
            margin-bottom: 25px;
        }

        .setup-section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            font-weight: 600;
            margin-bottom: 12px;
        }

        /* Checkbox styles */
        .custom-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #ccc;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
            background: white;
        }

        .custom-checkbox.checked {
            background: #667eea;
            border-color: #667eea;
        }

        .custom-checkbox.checked::after {
            content: '';
            width: 6px;
            height: 11px;
            border: solid white;
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg);
            margin-top: -2px;
        }

        /* Category list */
        .category-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .category-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .category-item:hover {
            background: rgba(102, 126, 234, 0.05);
        }

        .category-item label {
            font-size: 1rem;
            color: #333;
            cursor: pointer;
            flex: 1;
        }

        /* Select All button */
        .select-all-btn {
            background: none;
            border: 1px solid #667eea;
            color: #667eea;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            float: right;
            margin-top: -2px;
        }

        .select-all-btn:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        /* Start button */
        .start-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: #667eea;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .start-btn:hover:not(:disabled) {
            background: #5a6fd6;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .start-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .start-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .section-header .section-title {
            margin-bottom: 0;
        }

        @media (max-width: 600px) {
            .setup-card {
                padding: 25px;
            }

            .start-btn {
                font-size: 1rem;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="home-btn">Home</a>
            <h1>Listening Setup</h1>
        </header>

        <main>
            <div class="setup-card">
                <div class="setup-section">
                    <div class="section-header">
                        <div class="section-title">Categories</div>
                        <button class="select-all-btn" id="select-all-btn">Select All</button>
                    </div>
                    <div class="category-list" id="category-list">
                        <!-- Category checkboxes rendered by JS -->
                    </div>
                </div>

                <button class="start-btn" id="start-btn">Start Practice</button>
            </div>
        </main>
    </div>

    <script src="shared.js"></script>
    <script src="listening-setup.js"></script>
</body>
</html>
